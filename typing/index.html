<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>komuworks | タイピング計測</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body data-base-path="../">
    <div id="site-header"></div>

    <main class="container">
      <section class="card">
        <h1>タイピング計測</h1>
        <p>ボタンを押して 10 秒間のタイプ数を計測します。</p>
        <div class="typing-controls">
          <button id="start-btn" type="button">計測スタート</button>
          <input id="typing-input" type="text" placeholder="ここに入力" disabled />
        </div>
        <p id="typing-status">ステータス: 待機中</p>
        <p id="typing-result">結果: -</p>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="../assets/js/layout.js"></script>
    <script src="../assets/js/typing.js"></script>
  </body>
</html>
