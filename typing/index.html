<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>komuworks | タイピング記録</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body data-base-path="../">
    <div id="site-header"></div>

    <main class="container">
      <section class="card">
        <h1>タイピング記録</h1>
        <p>マナビジョン　日本語入力（5分計測）</p>
        <label for="typing-period-select">表示期間:</label>
        <select id="typing-period-select">
          <option value="7">直近7日</option>
          <option value="30" selected>直近30日</option>
          <option value="90">直近90日</option>
          <option value="all">全期間</option>
        </select>
        <p id="typing-status">ステータス: 読み込み中...</p>
        <canvas id="typing-metrics-chart" aria-label="タイピング記録グラフ" role="img"></canvas>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="../assets/js/layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../assets/js/typing.js"></script>
  </body>
</html>
