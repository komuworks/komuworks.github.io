<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>komuworks | Home</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body data-base-path="./">
    <div id="site-header"></div>

    <main class="container home-sections">
      <section class="card home-hero section-anchor" id="home-section">
        <div class="home-hero-media">
          <img src="assets/home-hero.svg" alt="komuworksのホームイメージ" class="home-hero-image" />
          <div class="home-hero-overlay">
            <h1 class="home-hero-title">komuworks</h1>
            <p class="home-hero-description">
              学習記録や開発メモ、タイピングの成長をまとめている個人サイトです。
              日々の取り組みをわかりやすく残していきます。
            </p>
          </div>
        </div>
      </section>

      <section class="card section-anchor" id="profile-section">
        <h2>Profile</h2>

        <section>
          <h3>Introduction</h3>
          <div id="self-introduction"></div>
        </section>

        <section>
          <h3>Skill Set</h3>
          <div id="skill-set"></div>
        </section>

        <section>
          <h3>Certifications</h3>
          <div id="certifications"></div>
        </section>

        <section>
          <h3>Personal Goals</h3>
          <div id="personal-goals"></div>
        </section>
      </section>

      <section class="card section-anchor" id="articles-section">
        <h2>Articles</h2>
        <p>最新の記事を表示しています（最大5件）。</p>
        <div id="home-articles-list" aria-live="polite"></div>
        <p><a href="pages/blog/index.html">記事一覧を見る</a></p>
      </section>

      <section class="card section-anchor" id="typing-section">
        <h2>Typing Log</h2>
        <p>マナビジョン　日本語入力（5分計測）</p>
        <label for="typing-period-select">表示期間:</label>
        <select id="typing-period-select">
          <option value="7">直近7日</option>
          <option value="30" selected>直近30日</option>
          <option value="90">直近90日</option>
          <option value="all">全期間</option>
        </select>
        <p id="typing-status">ステータス: 読み込み中...</p>
        <canvas
          id="typing-metrics-chart"
          aria-label="Typing Log Graph"
          role="img"
          data-detail-base-path="./pages/typing/"
        ></canvas>
      </section>
    </main>

    <div id="site-footer"></div>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/profile-components.js"></script>
    <script src="assets/js/profile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="assets/js/typing.js"></script>
    <script src="assets/js/home-articles.js"></script>
  </body>
</html>
